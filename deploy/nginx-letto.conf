# HTTP → HTTPS (все варианты адреса)
server {
    listen 80;
    server_name testletto.ru www.testletto.ru 147.45.158.254;
    return 301 https://testletto.ru$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name testletto.ru www.testletto.ru;

    ssl_certificate /etc/letsencrypt/live/testletto.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/testletto.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # www → без www
    if ($host = www.testletto.ru) {
        return 301 https://testletto.ru$request_uri;
    }

    location /uploads/ {
        alias /var/www/letto/public/uploads/;
        access_log off;
        add_header Cache-Control "public, max-age=86400";
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        client_max_body_size 10M;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
